# ============================================
# XMPP Chat Application - Docker Compose
# ============================================
# Works on Windows, Linux, and Mac

services:
  prosody:
    build:
      context: ./prosody
      dockerfile: Dockerfile
    container_name: xmpp-chat-prosody
    command: ["prosody", "-F"]
    ports:
      - "5222:5222"
      - "5269:5269"
      - "5280:5280"
    volumes:
      - prosody-data:/var/lib/prosody
      - ./prosody/prosody.cfg.lua:/etc/prosody/prosody.cfg.lua:ro
      - ./prosody/modules/mod_admin_net.lua:/usr/lib/prosody/modules/mod_admin_net.lua:ro
    environment:
      - PROSODY_HOST=localhost
    restart: unless-stopped
    networks:
      - xmpp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xmpp-chat-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - prosody
    restart: unless-stopped
    networks:
      - xmpp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xmpp-chat-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_SUPABASE_URL=https://cfydkldgxvxsxhejtdtr.supabase.co
      - VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmeWRrbGRneHZ4c3hoZWp0ZHRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjU2MjksImV4cCI6MjA5MDU0MTYyOX0.5qGylQ74EXzuolzz__BRwmICk-4ikYsH_gzedRLp72M
      - PROSODY_URL=http://prosody:5280
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/node_modules/.cache
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - xmpp-network

volumes:
  prosody-data:

networks:
  xmpp-network:
    driver: bridge
