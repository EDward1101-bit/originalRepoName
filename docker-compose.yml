# ============================================
# XMPP Chat Application - Docker Compose
# ============================================
# Works on Windows, Linux, and Mac

services:
  prosody:
    build:
      context: ./prosody
      dockerfile: Dockerfile
    container_name: xmpp-chat-prosody
    command: ["prosody", "-F"]
    ports:
      - "5222:5222"
      - "5269:5269"
      - "5280:5280"
    volumes:
      - prosody-data:/var/lib/prosody
      - ./prosody/prosody.cfg.lua:/etc/prosody/prosody.cfg.lua:ro
      - ./prosody/modules:/usr/lib/prosody/modules-custom:ro
    env_file:
      - ./.env
    environment:
      - SERVER_HOSTNAME=${SERVER_HOSTNAME:-localhost}
      - PROSODY_DOMAIN=${SERVER_HOSTNAME:-localhost}
      - PROSODY_ADMIN_USER=${PROSODY_ADMIN_USER:-admin}
    restart: unless-stopped
    networks:
      - xmpp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xmpp-chat-backend
    # Port 8000 removed, will be accessed via Nginx
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
    depends_on:
      - prosody
    init: true
    restart: unless-stopped
    networks:
      - xmpp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xmpp-chat-frontend
    # Port 5173 removed, will be accessed via Nginx
    env_file:
      - ./.env
    environment:
      - PROSODY_URL=http://prosody:5280
      - VITE_API_URL=http://${SERVER_HOSTNAME:-localhost}:8085/api
      - VITE_WS_URL=ws://${SERVER_HOSTNAME:-localhost}:8085/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/node_modules/.cache
    depends_on:
      - backend
    init: true
    restart: unless-stopped
    networks:
      - xmpp-network

  nginx:
    image: nginx:alpine
    container_name: xmpp-chat-nginx
    ports:
      - "8085:8085"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - xmpp-network

volumes:
  prosody-data:

networks:
  xmpp-network:
    driver: bridge
