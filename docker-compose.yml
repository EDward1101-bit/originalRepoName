# ============================================
# XMPP Chat Application - Docker Compose
# ============================================
# Works on Windows, Linux, and Mac

services:
  prosody:
    build:
      context: ./prosody
      dockerfile: Dockerfile
    container_name: xmpp-chat-prosody
    command: ["prosody", "-F"]
    ports:
      - "5222:5222"
      - "5269:5269"
      - "5280:5280"
    volumes:
      - prosody-data:/var/lib/prosody
      - ./prosody/prosody.cfg.lua:/etc/prosody/prosody.cfg.lua:ro
      - ./prosody/modules/mod_admin_net.lua:/usr/lib/prosody/modules/mod_admin_net.lua:ro
    environment:
      - PROSODY_HOST=localhost
    restart: unless-stopped
    networks:
      - xmpp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xmpp-chat-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - prosody
    init: true
    restart: unless-stopped
    networks:
      - xmpp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xmpp-chat-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    environment:
      - PROSODY_URL=http://prosody:5280
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/node_modules/.cache
    depends_on:
      - backend
    init: true
    restart: unless-stopped
    networks:
      - xmpp-network

  chatter:
    build:
      context: ./bots/chatter
      dockerfile: Dockerfile
    container_name: xmpp-chat-chatter
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - API_URL=http://backend:8000
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - WEBHOOK_HOST=http://xmpp-chat-chatter
      - SUPABASE_URL=https://cfydkldgxvxsxhejtdtr.supabase.co
      - SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmeWRrbGRneHZ4c3hoZWp0ZHRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjU2MjksImV4cCI6MjA5MDU0MTYyOX0.5qGylQ74EXzuolzz__BRwmICk-4ikYsH_gzedRLp72M
      - AGENTS_FILE=/data/agents.json
    volumes:
      - chatter-data:/data
    depends_on:
      - backend
      - ollama
    restart: unless-stopped
    networks:
      - xmpp-network

  ollama:
    image: ollama/ollama:latest
    container_name: xmpp-chat-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - xmpp-network

  ollama-pull:
    image: ollama/ollama:latest
    container_name: xmpp-chat-ollama-pull
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: [ "sh", "-c", "until OLLAMA_HOST=ollama ollama list >/dev/null 2>&1; do sleep 1; done && OLLAMA_HOST=ollama ollama pull qwen2.5:7b" ]
    depends_on:
      - ollama
    networks:
      - xmpp-network

volumes:
  prosody-data:
  chatter-data:
  ollama-data:

networks:
  xmpp-network:
    driver: bridge
