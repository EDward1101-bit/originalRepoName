<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aether Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root">
      <div
        style="
          background: #ffffff;
          height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
          color: #1e293b;
        "
      >
        <div
          style="
            width: min(420px, calc(100vw - 48px));
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(2, 6, 23, 0.08);
            overflow: hidden;
          "
        >
          <div style="padding: 32px; text-align: center;">
            <div
              style="
                width: 56px;
                height: 56px;
                margin: 0 auto;
                border-radius: 18px;
                background: #7c3aed;
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <div
                style="
                  width: 24px;
                  height: 24px;
                  border-radius: 999px;
                  border: 2px solid rgba(255, 255, 255, 0.85);
                  border-top-color: rgba(255, 255, 255, 0.0);
                  animation: aetherSpin 0.9s linear infinite;
                "
              ></div>
            </div>

            <div style="margin-top: 18px;">
              <div style="font-weight: 800; letter-spacing: -0.02em; font-size: 20px;">Aether</div>
              <div style="margin-top: 6px; font-size: 13px; color: #64748b; font-weight: 600;">
                Warming up…
              </div>
            </div>

            <div style="margin-top: 22px;">
              <div
                style="
                  height: 10px;
                  border-radius: 999px;
                  background: #f1f5f9;
                  overflow: hidden;
                "
              >
                <div
                  style="
                    height: 100%;
                    width: 35%;
                    background: rgba(124, 58, 237, 0.22);
                    animation: aetherPulse 1.1s ease-in-out infinite;
                  "
                ></div>
              </div>

              <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px;">
                <div style="height: 42px; border-radius: 18px; background: #f1f5f9; animation: aetherPulse 1.1s ease-in-out infinite;"></div>
                <div style="height: 42px; border-radius: 18px; background: #f1f5f9; animation: aetherPulse 1.1s ease-in-out infinite;"></div>
                <div style="height: 42px; border-radius: 18px; background: #f1f5f9; animation: aetherPulse 1.1s ease-in-out infinite;"></div>
              </div>
            </div>
          </div>
          <div style="height: 4px; background: rgba(124, 58, 237, 0.18); overflow: hidden;">
            <div style="height: 100%; width: 50%; background: rgba(124, 58, 237, 0.35); animation: aetherPulse 1.1s ease-in-out infinite;"></div>
          </div>
        </div>
      </div>
      <style>
        @keyframes aetherSpin {
          from {
            transform: rotate(0deg);
          }
          to {
            transform: rotate(360deg);
          }
        }
        @keyframes aetherPulse {
          0% {
            opacity: 0.55;
          }
          50% {
            opacity: 1;
          }
          100% {
            opacity: 0.55;
          }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
